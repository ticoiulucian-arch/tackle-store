spring:
  application:
    name: tackle-store

  datasource:
    url: jdbc:postgresql://localhost:5432/tacklestore
    driver-class-name: org.postgresql.Driver
    username: tackle
    password: tackle

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

app:
  cors:
    allowed-origins: http://localhost:3000

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:dqkiviymz}
  api-key: ${CLOUDINARY_API_KEY:881759542116688}
  api-secret: ${CLOUDINARY_API_SECRET:riHeMMUHqA_e3USPi4ykgXQ9_H4}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

